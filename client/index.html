<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta property="og:title" content="Barkley Online — Educación asincrónica inclusiva" />
    <meta property="og:description" content="Sin clases en vivo, sin horarios fijos. Cada lección con video y podcast. Preparación oficial para exámenes libres MINEDUC, de 5° básico a 4° medio." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_CL" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Sin clases en vivo. Cada lección con video y podcast. Preparación para exámenes libres MINEDUC." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!--Start of Tawk.to Script-->
    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    
    // Configuración personalizada en español
    Tawk_API.customStyle = {
      visibility : {
        desktop : {
          position : 'br',
          xOffset : 20,
          yOffset : 20
        },
        mobile : {
          position : 'br',
          xOffset : 10,
          yOffset : 10
        }
      }
    };
    
    // Mensaje de bienvenida personalizado
    Tawk_API.onLoad = function(){
      console.log('Tawk.to cargado - Configurando en español');
      
      // Personalizar nombre del agente
      Tawk_API.setAttributes({
        'name': 'Asistente Virtual UCE'
      }, function(error){
        if (!error) {
          console.log('Nombre del agente configurado');
        }
      });
      
      // Agregar evento de bienvenida personalizado
      Tawk_API.addEvent('visit', {
        message: '¡Hola! 👋 Bienvenido al Instituto UCE'
      }, function(error){
        if (!error) {
          console.log('Mensaje de bienvenida enviado');
        }
      });
    };
    
    // Configurar visitante
    Tawk_API.onBeforeLoad = function(){
      Tawk_API.visitor = {
        name : 'Visitante'
      };
    };
    
    // Mensaje cuando el chat se maximiza
    Tawk_API.onChatMaximized = function(){
      console.log('Chat maximizado');
    };
    
    (function(){
    var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src='https://embed.tawk.to/697ac2c6111a7519800fd43a/1jgie78i8?v=' + new Date().getTime();
    s1.charset='UTF-8';
    s1.setAttribute('crossorigin','*');
    s0.parentNode.insertBefore(s1,s0);
    })();
    </script>
    <!--End of Tawk.to Script-->
  </body>
</html>
